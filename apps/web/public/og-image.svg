<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0D060;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Subtle glow -->
  <rect width="1200" height="630" fill="url(#glowGrad)" />

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#goldGrad)" opacity="0.6" />

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- AKAI wordmark -->
  <text x="100" y="300" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="180" fill="#ffffff" letter-spacing="-6">AKAI</text>

  <!-- Tagline -->
  <text x="104" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="42" fill="url(#goldGrad)" letter-spacing="1">Your AI Business Partner</text>

  <!-- Descriptor line -->
  <text x="106" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="24" fill="#ffffff" opacity="0.35" letter-spacing="0.5">9 specialised AI agents · Sales · Recruitment · Web · Ads · Social</text>

  <!-- URL badge -->
  <rect x="100" y="490" width="220" height="44" rx="22" fill="#D4AF37" opacity="0.12" />
  <rect x="100" y="490" width="220" height="44" rx="22" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" />
  <text x="210" y="518" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="18" fill="#D4AF37" text-anchor="middle" letter-spacing="0.5">getakai.ai</text>

  <!-- Right side decorative element -->
  <circle cx="980" cy="315" r="200" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.06" />
  <circle cx="980" cy="315" r="150" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.06" />
  <circle cx="980" cy="315" r="100" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.08" />
  <circle cx="980" cy="315" r="50" fill="#D4AF37" opacity="0.06" />

  <!-- AI nodes -->
  <circle cx="980" cy="165" r="8" fill="#D4AF37" opacity="0.4" />
  <circle cx="1130" cy="315" r="8" fill="#D4AF37" opacity="0.4" />
  <circle cx="980" cy="465" r="8" fill="#D4AF37" opacity="0.4" />
  <circle cx="830" cy="315" r="8" fill="#D4AF37" opacity="0.4" />
  <line x1="980" y1="165" x2="980" y2="265" stroke="#D4AF37" stroke-opacity="0.15" stroke-width="1" />
  <line x1="1130" y1="315" x2="1080" y2="315" stroke="#D4AF37" stroke-opacity="0.15" stroke-width="1" />
  <line x1="980" y1="465" x2="980" y2="365" stroke="#D4AF37" stroke-opacity="0.15" stroke-width="1" />
  <line x1="830" y1="315" x2="880" y2="315" stroke="#D4AF37" stroke-opacity="0.15" stroke-width="1" />
</svg>
